<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Контакты — Никс Фотограф</title>
    <link rel="stylesheet" href="theme.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; line-height: 1.6; background: var(--bg-light); color: var(--text-dark); overflow-x: hidden; }
        h1, h2, h3 { font-family: 'Playfair Display', Georgia, 'Times New Roman', serif; font-weight: 700; line-height: 1.2; }
        .navbar { position: fixed; top: 0; width: 100%; background: var(--bg-light); backdrop-filter: blur(15px) saturate(180%); z-index: 10000; padding: 0.5rem 0; border-bottom: 1px solid rgba(245,158,11,0.1); transition: all 0.3s ease; }
        .navbar.scrolled { background: var(--bg-light); box-shadow: var(--shadow-light); padding: 0.3rem 0; border-bottom: 1px solid rgba(245,158,11,0.3); }
        .nav-container { max-width: 1200px; margin: 0 auto; padding: 0 20px; display: flex; justify-content: center; align-items: center; }
        .nav-logo { margin-right: 50px; }
        .nav-logo a { display: flex; align-items: center; text-decoration: none; }
        .nav-logo img { height: 84px; width: auto; transition: all 0.3s; }
        .nav-logo:hover img { transform: scale(1.1) rotate(5deg); filter: drop-shadow(0 0 10px rgba(245,158,11,0.5)); }
        .nav-menu { display: flex; list-style: none; gap: 2rem; }
        .nav-link { text-decoration: none; color: var(--text-light); font-weight: 500; position: relative; transition: all 0.3s; padding: 5px 10px; border-radius: 8px; }
        .nav-link::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: var(--gradient-secondary); opacity: 0; border-radius: 8px; transition: opacity 0.3s; z-index: -1; }
        .nav-link::after { content: ''; position: absolute; bottom: -5px; left: 50%; width: 0; height: 2px; background: var(--gradient-secondary); transition: all 0.3s; transform: translateX(-50%); }
        .nav-link:hover::before { opacity: 0.1; }
        .nav-link:hover::after, .nav-link.active::after { width: 80%; }
        .nav-link:hover, .nav-link.active { color: var(--text-dark); transform: translateY(-2px); text-shadow: var(--shadow-glow); }
        .container { max-width: 800px; margin: 0 auto; padding: 120px 20px 60px; }
        h1 { font-size: 3rem; text-align: center; margin-bottom: 2rem; background: var(--gradient-animated); background-size: 400% 400%; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: gradient 4s ease infinite; }
        @keyframes gradient { 0%, 100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }
        .contact-content { background: var(--bg-card); padding: 3rem; border-radius: 20px; text-align: center; box-shadow: var(--shadow-heavy); border: 1px solid rgba(245,158,11,0.2); animation: fadeIn 0.6s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .contact-item { margin: 2rem 0; padding: 2rem; background: var(--bg-light); border-radius: 15px; transition: all 0.5s; border: 1px solid rgba(245,158,11,0.1); }
        .contact-item:hover { transform: translateY(-5px); box-shadow: 0 15px 40px rgba(245,158,11,0.2); border-color: rgba(245,158,11,0.3); }
        .contact-item h3 { color: var(--secondary-color); margin-bottom: 0.5rem; font-size: 1.5rem; }
        .contact-item p { color: #a1a1aa; font-size: 1.2rem; }
        .contact-item a { color: var(--secondary-color); text-decoration: none; transition: all 0.3s; }
        .contact-item a:hover { color: #fb923c; text-shadow: 0 0 10px rgba(245,158,11,0.5); }
        .social-links { display: flex; justify-content: center; gap: 1rem; margin-top: 2rem; }
        .social-link { padding: 1rem 2rem; background: var(--gradient-secondary); color: white; text-decoration: none; border-radius: 15px; transition: all 0.5s; box-shadow: var(--shadow-glow); }
        .social-link:hover { transform: translateY(-5px) scale(1.05); box-shadow: 0 20px 50px rgba(245,158,11,0.5); }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo"><a href="index.html"><img src="images/niks.png" alt="Никс"></a></div>
            <ul class="nav-menu">
                <li><a href="index.html" class="nav-link">🏠 Главная</a></li>
                <li><a href="portfolio.html" class="nav-link">📸 Портфолио</a></li>
                <li><a href="about.html" class="nav-link">👤 О нас</a></li>
                <li><a href="blog.html" class="nav-link">📝 Блог</a></li>
                <li><a href="contact.html" class="nav-link active">📞 Контакты</a></li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <h1>Свяжитесь со мной</h1>
        <div class="contact-content">
            <p style="color: #a1a1aa; margin-bottom: 2rem; font-size: 1.1rem;">Готовы создать что-то особенное? Напишите мне!</p>
            
            <div class="contact-item">
                <h3>📧 Email</h3>
                <p><a href="mailto:niksfotograf@gmail.com">niksfotograf@gmail.com</a></p>
            </div>

            <div class="contact-item">
                <h3>💬 Telegram</h3>
                <p><a href="https://t.me/objektivniksa" target="_blank">@objektivniksa</a></p>
            </div>

            <div class="social-links">
                <a href="https://t.me/objektivniksa" class="social-link" target="_blank">Написать в Telegram</a>
            </div>
        </div>
    </div>
</body>
<script>
    const navbar = document.querySelector('.navbar');
    window.addEventListener('scroll', () => {
        if (window.scrollY > 50) {
            navbar.classList.add('scrolled');
        } else {
            navbar.classList.remove('scrolled');
        }
    });
    
    const isMobile = window.innerWidth <= 768;
    
    if (!isMobile) {
        document.addEventListener('mousemove', (e) => {
            const cards = document.querySelectorAll('.contact-item, .contact-content');
            cards.forEach(card => {
                const rect = card.getBoundingClientRect();
                const x = (e.clientX - rect.left - rect.width / 2) / 20;
                const y = (e.clientY - rect.top - rect.height / 2) / 20;
                card.style.transform = `perspective(1000px) rotateY(${x}deg) rotateX(${-y}deg)`;
            });
        });
    }
    
    window.addEventListener('scroll', () => {
        const sections = document.querySelectorAll('section, .container');
        sections.forEach(section => {
            const rect = section.getBoundingClientRect();
            if (rect.top < window.innerHeight / 2 && rect.bottom > window.innerHeight / 2) {
                section.style.boxShadow = '0 0 50px rgba(245, 158, 11, 0.3)';
            } else {
                section.style.boxShadow = 'none';
            }
        });
    });
</script>
<script src="theme.js"></script>
</html>
