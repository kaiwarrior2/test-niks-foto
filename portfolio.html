    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; line-height: 1.6; background: var(--bg-light); color: var(--text-dark); overflow-x: hidden; }
        h1, h2 { font-family: 'Playfair Display', Georgia, 'Times New Roman', serif; font-weight: 700; line-height: 1.2; }
        .container { max-width: 1200px; margin: 0 auto; padding: 120px 20px 60px; }
        h1 { font-size: 3.5rem; text-align: center; margin-bottom: 3rem; background: var(--gradient-animated); background-size: 400% 400%; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: gradient 4s ease infinite; }
        @keyframes gradient { 0%, 100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 30px; }
        .gallery-item { position: relative; overflow: hidden; border-radius: 20px; cursor: pointer; transition: all 0.5s; box-shadow: 0 10px 30px rgba(0,0,0,0.3); opacity: 0; animation: fadeIn 0.6s forwards; }
        .gallery-item:nth-child(1) { animation-delay: 0.1s; }
        .gallery-item:nth-child(2) { animation-delay: 0.2s; }
        .gallery-item:nth-child(3) { animation-delay: 0.3s; }
        .gallery-item:nth-child(4) { animation-delay: 0.4s; }
        .gallery-item:nth-child(5) { animation-delay: 0.5s; }
        .gallery-item:nth-child(6) { animation-delay: 0.6s; }
        .gallery-item:nth-child(7) { animation-delay: 0.7s; }
        .gallery-item:nth-child(8) { animation-delay: 0.8s; }
        .gallery-item:nth-child(9) { animation-delay: 0.9s; }
        .gallery-item:nth-child(10) { animation-delay: 1s; }
        .gallery-item:nth-child(11) { animation-delay: 1.1s; }
        .gallery-item:nth-child(12) { animation-delay: 1.2s; }
        .gallery-item:nth-child(13) { animation-delay: 1.3s; }
        .gallery-item:nth-child(14) { animation-delay: 1.4s; }
        .gallery-item:nth-child(15) { animation-delay: 1.5s; }
        .gallery-item:nth-child(16) { animation-delay: 1.6s; }
        .gallery-item:nth-child(17) { animation-delay: 1.7s; }
        .gallery-item:nth-child(18) { animation-delay: 1.8s; }
        .gallery-item:nth-child(19) { animation-delay: 1.9s; }
        .gallery-item:nth-child(20) { animation-delay: 2s; }
        .gallery-item:nth-child(21) { animation-delay: 2.1s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .gallery-item::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, rgba(245,158,11,0.3), rgba(251,146,60,0.3)); opacity: 0; transition: opacity 0.3s; z-index: 1; pointer-events: none; }
        .gallery-item:hover { transform: translateY(-10px) scale(1.03); box-shadow: 0 20px 60px rgba(245,158,11,0.4); }
        .gallery-item:hover::before { opacity: 1; }
        .gallery-item img { width: 100%; height: 350px; object-fit: cover; display: block; transition: transform 0.5s; }
        .gallery-item:hover img { transform: scale(1.1); }
        .navbar { position: fixed; top: 0; width: 100%; background: var(--bg-light); backdrop-filter: blur(15px) saturate(180%); z-index: 10000; padding: 0.5rem 0; border-bottom: 1px solid rgba(245,158,11,0.1); transition: all 0.3s ease; }
        .navbar.scrolled { background: rgba(24,24,27,0.98); box-shadow: 0 5px 15px rgba(0,0,0,0.3), 0 0 20px rgba(245,158,11,0.1); padding: 0.3rem 0; border-bottom: 1px solid rgba(245,158,11,0.3); }
        .nav-container { max-width: 1200px; margin: 0 auto; padding: 0 20px; display: flex; justify-content: center; align-items: center; }
        .nav-logo { margin-right: 50px; }
        .nav-logo a { display: flex; align-items: center; text-decoration: none; }
        .nav-logo img { height: 84px; width: auto; transition: all 0.3s; }
        .nav-logo:hover img { transform: scale(1.1) rotate(5deg); filter: drop-shadow(0 0 10px rgba(245,158,11,0.5)); }
        .nav-menu { display: flex; list-style: none; gap: 2rem; }
        .nav-link { text-decoration: none; color: #a1a1aa; font-weight: 500; position: relative; transition: all 0.3s; padding: 5px 10px; border-radius: 8px; }
        .nav-link::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, #f59e0b, #fb923c); opacity: 0; border-radius: 8px; transition: opacity 0.3s; z-index: -1; }
        .nav-link::after { content: ''; position: absolute; bottom: -5px; left: 50%; width: 0; height: 2px; background: linear-gradient(135deg, #f59e0b, #fb923c); transition: all 0.3s; transform: translateX(-50%); }
        .nav-link:hover::before { opacity: 0.1; }
        .nav-link:hover::after, .nav-link.active::after { width: 80%; }
        .nav-link:hover, .nav-link.active { color: #f4f4f5; transform: translateY(-2px); text-shadow: 0 0 10px rgba(245,158,11,0.3); }
        .modal { display: none; position: fixed; z-index: 20000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); backdrop-filter: blur(10px); }
        .modal.active { display: flex; align-items: center; justify-content: center; animation: fadeIn 0.3s; }
        .modal-content { max-width: 90%; max-height: 90vh; object-fit: contain; border-radius: 10px; box-shadow: 0 0 50px rgba(245,158,11,0.5); }
        .modal-close { position: absolute; top: 30px; right: 50px; font-size: 50px; color: #fff; cursor: pointer; transition: all 0.3s; }
        .modal-close:hover { color: #f59e0b; transform: rotate(90deg); }
    </style>
</head>

    <div class="modal" id="imageModal">
        <span class="modal-close" onclick="closeModal()">&times;</span>
        <img class="modal-content" id="modalImage">
    </div>

<script>
    function openModal(imgSrc) {
        document.getElementById('imageModal').classList.add('active');
        document.getElementById('modalImage').src = imgSrc;
        document.body.style.overflow = 'hidden';
    }
    
    function closeModal() {
        document.getElementById('imageModal').classList.remove('active');
        document.body.style.overflow = 'auto';
    }
    
    document.getElementById('imageModal').addEventListener('click', function(e) {
        if (e.target === this) closeModal();
    });
    
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') closeModal();
    });
    
    document.querySelectorAll('.gallery-item img').forEach(img => {
        img.addEventListener('click', function() {
            openModal(this.src);
        });
    });
    
    const navbar = document.getElementById('navbar');
    window.addEventListener('scroll', () => {
        if (window.scrollY > 50) {
            navbar.classList.add('scrolled');
        } else {
            navbar.classList.remove('scrolled');
        }
    });
    
    const isMobile = window.innerWidth <= 768;
    

    
    window.addEventListener('scroll', () => {
        const sections = document.querySelectorAll('section, .container');
        sections.forEach(section => {
            const rect = section.getBoundingClientRect();
            if (rect.top < window.innerHeight / 2 && rect.bottom > window.innerHeight / 2) {
                section.style.boxShadow = '0 0 50px rgba(245, 158, 11, 0.3)';
            } else {
                section.style.boxShadow = 'none';
            }
        });
    });
</script>
